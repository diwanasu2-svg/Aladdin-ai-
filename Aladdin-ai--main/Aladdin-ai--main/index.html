<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aladdin — AI Assistant</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #f78166;
      --accent2: #79c0ff;
      --user-bg: #1f3a5f;
      --ai-bg: #1e2a1e;
      --success: #3fb950;
      --warning: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent2); }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--warning);
      transition: background 0.4s;
    }
    .status-dot.ok { background: var(--success); }
    .status-text { font-size: 0.78rem; color: var(--muted); }
    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .model-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: var(--accent2);
    }

    /* ── Layout ── */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-section {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .fact-list, .reminder-list {
      list-style: none;
      font-size: 0.82rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 150px;
      overflow-y: auto;
    }
    .fact-item, .reminder-item {
      background: var(--surface2);
      border-radius: 6px;
      padding: 5px 9px;
      display: flex;
      gap: 6px;
    }
    .fact-key { color: var(--accent2); font-weight: 600; min-width: 70px; }
    .fact-val { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty-state { color: var(--muted); font-size: 0.8rem; font-style: italic; }

    .sidebar-actions { padding: 10px 16px; display: flex; flex-direction: column; gap: 7px; }
    .sidebar-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 7px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-btn:hover { background: var(--border); border-color: var(--accent2); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      gap: 4px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .message.user { align-self: flex-end; }
    .message.ai   { align-self: flex-start; }
    .bubble {
      padding: 11px 16px;
      border-radius: 14px;
      font-size: 0.93rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }
    .message.ai .bubble {
      background: var(--ai-bg);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .bubble.typing::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
      color: var(--accent2);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .meta { font-size: 0.72rem; color: var(--muted); padding: 0 4px; }
    .message.user .meta { text-align: right; }
    .search-badge {
      display: inline-block;
      font-size: 0.68rem;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      color: var(--success);
      border-radius: 8px;
      padding: 1px 7px;
      margin-left: 6px;
    }

    /* ── Input bar ── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.93rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 140px;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent2); }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      padding: 10px 18px;
      cursor: pointer;
      height: 42px;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      min-width: 360px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h3 { color: var(--accent2); margin-bottom: 16px; font-size: 1rem; }
    .modal label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 10px; }
    .modal input, .modal select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 11px;
      font-size: 0.88rem;
      outline: none;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent2); }
    .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
    .modal-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .modal-btn.secondary { background: var(--surface2); color: var(--text); }
    .modal-btn:hover { opacity: 0.85; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">🪄 Alad<span>din</span></div>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-text" id="statusText">Connecting…</div>
  <div class="header-right">
    <div class="model-badge" id="modelBadge">—</div>
  </div>
</header>

<!-- ── Main layout ── -->
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">🧠 Memory Facts</div>
      <ul class="fact-list" id="factList">
        <li class="empty-state">Loading…</li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">⏰ Reminders</div>
      <ul class="reminder-list" id="reminderList">
        <li class="empty-state">None pending</li>
      </ul>
    </div>
    <div class="sidebar-actions">
      <button class="sidebar-btn" onclick="openReminderModal()">➕ Add Reminder</button>
      <button class="sidebar-btn" onclick="openEventModal()">📅 Add Calendar Event</button>
      <button class="sidebar-btn" onclick="loadSidebar()">🔄 Refresh</button>
      <button class="sidebar-btn" onclick="clearChat()">🗑️ Clear Chat</button>
    </div>
  </aside>

  <!-- ── Chat ── -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="message ai">
        <div class="bubble">Hello! I'm Aladdin, your AI assistant. How can I help you today?</div>
        <div class="meta">Just now</div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="inputBox"
        placeholder="Ask me anything…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- ── Reminder Modal ── -->
<div class="modal-overlay" id="reminderModal">
  <div class="modal">
    <h3>⏰ Set a Reminder</h3>
    <label>Message</label>
    <input type="text" id="reminderMsg" placeholder="e.g. Take your medicine" />
    <label>In how many minutes?</label>
    <input type="number" id="reminderMins" value="10" min="1" />
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('reminderModal')">Cancel</button>
      <button class="modal-btn primary" onclick="submitReminder()">Set Reminder</button>
    </div>
  </div>
</div>

<!-- ── Event Modal ── -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h3>📅 Add Calendar Event</h3>
    <label>Title</label>
    <input type="text" id="eventTitle" placeholder="Meeting with team" />
    <label>Start (date & time)</label>
    <input type="datetime-local" id="eventStart" />
    <label>Description (optional)</label>
    <input type="text" id="eventDesc" placeholder="Optional notes" />
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('eventModal')">Cancel</button>
      <button class="modal-btn primary" onclick="submitEvent()">Add Event</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let isThinking = false;

// ── Helpers ─────────────────────────────────────────────────────────

function now() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function clearChat() {
  document.getElementById('messages').innerHTML = `
    <div class="message ai">
      <div class="bubble">Chat cleared. How can I help?</div>
      <div class="meta">${now()}</div>
    </div>`;
}

// ── API calls ────────────────────────────────────────────────────────

async function fetchStatus() {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    const badge = document.getElementById('modelBadge');
    if (d.ollama_available) {
      dot.classList.add('ok');
      txt.textContent = 'Online';
    } else {
      dot.classList.remove('ok');
      txt.textContent = 'Ollama offline';
    }
    badge.textContent = d.model || '—';
  } catch {
    document.getElementById('statusText').textContent = 'API offline';
  }
}

async function sendMessage() {
  if (isThinking) return;
  const box = document.getElementById('inputBox');
  const text = box.value.trim();
  if (!text) return;

  box.value = '';
  autoResize(box);
  isThinking = true;
  document.getElementById('sendBtn').disabled = true;

  // User bubble
  const msgs = document.getElementById('messages');
  msgs.innerHTML += `
    <div class="message user">
      <div class="bubble">${escHtml(text)}</div>
      <div class="meta">${now()}</div>
    </div>`;

  // Thinking bubble
  const thinkId = 'think_' + Date.now();
  msgs.innerHTML += `
    <div class="message ai" id="${thinkId}">
      <div class="bubble typing" id="${thinkId}_b">Thinking</div>
      <div class="meta">${now()}</div>
    </div>`;
  scrollBottom();

  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const d = await r.json();
    const bubble = document.getElementById(thinkId + '_b');
    if (bubble) {
      bubble.classList.remove('typing');
      bubble.textContent = d.reply;
      const meta = bubble.parentElement.querySelector('.meta');
      if (meta && d.search_used) {
        meta.innerHTML = `${now()} <span class="search-badge">🔍 web search</span>`;
      }
    }
    loadSidebar();
  } catch (err) {
    const bubble = document.getElementById(thinkId + '_b');
    if (bubble) {
      bubble.classList.remove('typing');
      bubble.textContent = '⚠️ Could not reach the API server. Is it running on port 8000?';
    }
  } finally {
    isThinking = false;
    document.getElementById('sendBtn').disabled = false;
    scrollBottom();
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
           .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ── Sidebar ──────────────────────────────────────────────────────────

async function loadSidebar() {
  // Facts
  try {
    const r = await fetch(`${API}/memory/facts`);
    const facts = await r.json();
    const list = document.getElementById('factList');
    if (!facts.length) {
      list.innerHTML = '<li class="empty-state">None stored yet</li>';
    } else {
      list.innerHTML = facts.slice(0, 8).map(f => `
        <li class="fact-item">
          <span class="fact-key">${escHtml(f.key)}</span>
          <span class="fact-val">${escHtml(String(f.value))}</span>
        </li>`).join('');
    }
  } catch {}

  // Reminders
  try {
    const r = await fetch(`${API}/reminders`);
    const rems = await r.json();
    const list = document.getElementById('reminderList');
    if (!rems.length) {
      list.innerHTML = '<li class="empty-state">None pending</li>';
    } else {
      list.innerHTML = rems.slice(0, 5).map(rem => {
        const dt = new Date(rem.trigger_dt);
        const t = dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        return `<li class="reminder-item"><span>${escHtml(rem.message)}</span><span style="margin-left:auto;color:var(--muted);font-size:0.75rem">${t}</span></li>`;
      }).join('');
    }
  } catch {}
}

// ── Modals ────────────────────────────────────────────────────────────

function openReminderModal() { document.getElementById('reminderModal').classList.add('open'); }
function openEventModal() {
  // Default to now + 1h
  const d = new Date(Date.now() + 3600000);
  const iso = d.toISOString().slice(0,16);
  document.getElementById('eventStart').value = iso;
  document.getElementById('eventModal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function submitReminder() {
  const msg = document.getElementById('reminderMsg').value.trim();
  const mins = parseInt(document.getElementById('reminderMins').value) || 10;
  if (!msg) return;
  try {
    await fetch(`${API}/reminder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, minutes: mins }),
    });
    closeModal('reminderModal');
    document.getElementById('reminderMsg').value = '';
    loadSidebar();
  } catch {}
}

async function submitEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  const start = document.getElementById('eventStart').value;
  const desc  = document.getElementById('eventDesc').value.trim();
  if (!title || !start) return;
  try {
    await fetch(`${API}/calendar/event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, start, description: desc }),
    });
    closeModal('eventModal');
    document.getElementById('eventTitle').value = '';
    document.getElementById('eventDesc').value = '';
  } catch {}
}

// ── Init ─────────────────────────────────────────────────────────────

fetchStatus();
loadSidebar();
setInterval(fetchStatus, 15000);
setInterval(loadSidebar, 30000);

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
</script>
</body>
</html>
